name: Module CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install system deps
        run: sudo apt-get install -y libasound2-dev

      - name: Install vo
        run: curl -fsSL "https://github.com/vo-lang/volang/releases/latest/download/vo-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C /usr/local/bin vo

      - name: Verify release state
        run: vo release verify .

      - name: Check module
        run: vo check .

      - name: Test module
        run: |
          if [ -d tests ]; then
            vo test tests
          else
            echo "no tests directory"
          fi

  release_assets:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: validate
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install vo
        run: curl -fsSL "https://github.com/vo-lang/volang/releases/latest/download/vo-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C /usr/local/bin vo

      - name: Stage release assets
        run: |
          vo release stage . \
            --version "${{ inputs.version || github.event.release.tag_name || github.ref_name }}" \
            --artifact extension-wasm wasm32-unknown-unknown vogui.wasm ./vogui.wasm \
            --out-dir release-dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
          files: release-dist/*

  publish_npm:
    if: github.event_name == 'release'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from release tag
        working-directory: js
        run: |
          version="${{ github.event.release.tag_name }}"
          npm version "${version#v}" --no-git-tag-version

      - name: Install dependencies
        working-directory: js
        run: npm ci

      - name: Build
        working-directory: js
        run: npm run build

      - name: Publish to npm
        working-directory: js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
