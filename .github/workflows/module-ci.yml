name: Module CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from (defaults to the triggering ref)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  VOLANG_REF: 6bf8cbe3562feedfb3a67554d97745edc3e8c262

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install system deps
        run: sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout volang toolchain
        uses: actions/checkout@v4
        with:
          repository: vo-lang/volang
          ref: ${{ env.VOLANG_REF }}
          path: volang

      - name: Build vo
        run: cargo build --manifest-path volang/cmd/vo/Cargo.toml --release

      - name: Expose vo on PATH
        run: echo "$GITHUB_WORKSPACE/volang/target/release" >> "$GITHUB_PATH"

      - name: Verify release state
        run: vo release verify .

      - name: Check module
        run: vo check .

      - name: Test module
        run: |
          if [ -d tests ]; then
            vo test tests
          else
            echo "no tests directory"
          fi

  build_native_release_artifacts:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            library: libvo_vogui.dylib
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            library: libvo_vogui.so
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            library: vo_vogui.dll
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build native extension
        run: cargo build --manifest-path rust/ext/Cargo.toml --lib --release --target ${{ matrix.target }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v6
        with:
          name: native-${{ matrix.target }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.library }}

  build_wasm_release_artifact:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: validate
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Build standalone WASM extension
        run: cargo build --manifest-path rust/ext/Cargo.toml --release --target wasm32-unknown-unknown --no-default-features --features wasm-standalone

      - name: Prepare WASM artifact
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/vogui-wasm"
          cp web-artifacts/vogui.wasm "$RUNNER_TEMP/vogui-wasm/vogui.wasm"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v6
        with:
          name: wasm-standalone
          path: ${{ runner.temp }}/vogui-wasm/vogui.wasm

  release_assets:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs:
      - build_native_release_artifacts
      - build_wasm_release_artifact
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout volang toolchain
        uses: actions/checkout@v4
        with:
          repository: vo-lang/volang
          ref: ${{ env.VOLANG_REF }}
          path: volang

      - name: Build vo
        run: cargo build --manifest-path volang/cmd/vo/Cargo.toml --release

      - name: Expose vo on PATH
        run: echo "$GITHUB_WORKSPACE/volang/target/release" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        working-directory: js
        run: npm ci

      - name: Build Studio JS assets
        working-directory: js
        run: npm run build

      - name: Download staged release artifacts
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/release-artifacts
          merge-multiple: true

      - name: Stage release assets
        shell: bash
        run: |
          version="${{ inputs.version || github.event.release.tag_name || github.ref_name }}"
          vo release stage . \
            --version "$version" \
            --artifact extension-native aarch64-apple-darwin libvo_vogui.dylib "$RUNNER_TEMP/release-artifacts/libvo_vogui.dylib" \
            --artifact extension-native x86_64-unknown-linux-gnu libvo_vogui.so "$RUNNER_TEMP/release-artifacts/libvo_vogui.so" \
            --artifact extension-native x86_64-pc-windows-msvc vo_vogui.dll "$RUNNER_TEMP/release-artifacts/vo_vogui.dll" \
            --artifact extension-wasm wasm32-unknown-unknown vogui.wasm "$RUNNER_TEMP/release-artifacts/vogui.wasm" \
            --out-dir "$RUNNER_TEMP/release-dist"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.version || github.event.release.tag_name || github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$RUNNER_TEMP/release-dist"/* --clobber
          else
            gh release create "$tag" "$RUNNER_TEMP/release-dist"/* --title "vogui $tag"
          fi

  publish_npm:
    if: github.event_name == 'release'
    needs:
      - validate
      - release_assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from release tag
        working-directory: js
        run: |
          version="${{ github.event.release.tag_name }}"
          npm version "${version#v}" --no-git-tag-version

      - name: Install dependencies
        working-directory: js
        run: npm ci

      - name: Build
        working-directory: js
        run: npm run build

      - name: Publish to npm
        working-directory: js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
